<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#0b0b12" stop-opacity="1"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="280" cy="220" r="160" fill="#a855f7" opacity="0.25" filter="url(#blur)"/>
  <circle cx="900" cy="260" r="200" fill="#22d3ee" opacity="0.18" filter="url(#blur)"/>
  <circle cx="640" cy="640" r="260" fill="#f472b6" opacity="0.10" filter="url(#blur)"/>
  <g transform="translate(160 190)">
    <rect x="0" y="0" width="880" height="520" rx="32" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <circle cx="170" cy="205" r="96" fill="rgba(255,255,255,0.10)" stroke="url(#stroke)" stroke-width="4"/>
    <path d="M66 420c35-85 117-140 206-140s171 55 206 140" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
    <text x="360" y="205" fill="rgba(231,233,240,0.92)" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto" font-size="44" font-weight="700">
      Your Name
    </text>
    <text x="360" y="255" fill="rgba(156,163,175,0.95)" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto" font-size="22">
      Senior MERN Stack Developer
    </text>
    <text x="360" y="330" fill="rgba(156,163,175,0.9)" font-family="ui-monospace, Consolas, monospace" font-size="18">
      Replace this with your photo anytime.
    </text>
  </g>
</svg>

